<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GULF WATCH JP</title><link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"></head>
<body><header><div><b>GULF WATCH JP</b><span>ドバイ在住者向け 湾岸・イラン情勢</span></div><small id="updated"></small></header>
<main>
<section class="hero"><div><p>現在のドバイ影響度</p><h1 id="risk">読み込み中...</h1><p id="riskText"></p></div></section>
<section><h2>前回見た時から何が変わった？</h2><div id="changes" class="cards"></div></section>
<section><h2>最新の重要情報</h2><div class="filters"><button data-filter="all">すべて</button><button data-filter="US">米国・トランプ</button><button data-filter="Iran">イラン</button><button data-filter="Gulf">湾岸諸国</button><button data-filter="Flight">空域・フライト</button><button data-filter="Hormuz">ホルムズ海峡</button></div><div id="news" class="cards"></div></section>
<section><h2>地域マップ</h2><p class="note">確認済みの地点情報があるニュースのみ表示します。推測地点は表示しません。</p><div id="map"></div></section>
</main><footer>Prototype • 情報は複数の信頼できる情報源で確認してください。</footer>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="app.js"></script></body></html>
