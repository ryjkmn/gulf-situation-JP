<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GULF WATCH JP</title>

  <link rel="stylesheet" href="style.css">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  >
</head>

<body>

<header class="site-header">
  <div>
    <div class="logo">GULF WATCH JP</div>
    <div class="tagline">ドバイ在住者向け 湾岸・イラン情勢</div>
  </div>

  <div class="update-time">
    更新: <span id="updatedAt">確認中...</span>
  </div>
</header>


<main>

  <!-- CURRENT STATUS -->

  <section class="hero">

    <div class="hero-label">
      CURRENT DUBAI STATUS
    </div>

    <h1 id="riskLevel">
      確認中
    </h1>

    <p id="riskText" class="hero-highlight">
      最新情報を確認しています。
    </p>

  </section>


  <!-- WHAT CHANGED -->

  <section class="changed-section">

    <div class="section-number">01</div>

    <h2>
      前回見た時から<br>
      何が変わった？
    </h2>

    <div id="changes" class="changes-list">
      <p class="empty">
        最新情報を確認しています。
      </p>
    </div>

  </section>


  <!-- LATEST NEWS -->

  <section class="news-section">

    <div class="section-number">02</div>

    <h2>
      最新の<br>
      重要情報
    </h2>

    <div id="filters" class="filters"></div>

    <div id="newsList" class="news-list"></div>

  </section>


  <!-- MAP -->

  <section class="map-section">

    <div class="section-number">03</div>

    <h2>
      地域マップ
    </h2>

    <p class="section-description">
      確認済みの地点情報があるニュースのみ表示します。
      推測地点は表示しません。
    </p>

    <div id="map"></div>

    <a
      class="flight-link"
      href="https://www.flightradar24.com/"
      target="_blank"
      rel="noopener noreferrer"
    >
      LIVE FLIGHT STATUS ↗
    </a>

  </section>

</main>


<footer>

  <div class="footer-logo">
    GULF WATCH JP
  </div>

  <p>
    公開情報を自動収集して表示しています。
    重要な判断には必ず公的機関や航空会社の公式情報も確認してください。
  </p>

</footer>


<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script src="app.js"></script>

</body>
</html>
